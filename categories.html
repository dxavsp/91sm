    /* ── 分类网格 ── */
    .cat-grid {

    /* 单张分类卡 */
    .cat-card {

      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .22s, transform .22s, box-shadow .22s;
      background: var(--bg3);
    }

    .cat-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 14px 40px rgba(240,62,62,.32);
    }

    /* 封面图区域：16:9 */
    .cat-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
    }

    .cat-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s ease;
      filter: brightness(.88);
    }

    .cat-card:hover .cat-cover img {
      transform: scale(1.06);
      filter: brightness(1);
    }

    /* 无图时的渐变占位 */
    .cat-cover .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      transition: transform .35s;

    .cat-card:hover .cover-placeholder { transform: scale(1.08); }

    /* 底部遮罩 */

      font-weight: 700;

      border-radius: 4px;

      transform: translateY(-4px);

      pointer-events: none;
    }

    .cat-card:hover .cat-badge {

      transform: translateY(0);
    }

      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(.7);
      width: 44px; height: 44px;
      background: rgba(240,62,62,.9);
      border-radius: 50%;

      font-size: 16px; color: #fff;
      opacity: 0;
      transition: opacity .22s, transform .22s;
      pointer-events: none;
    }

    .cat-card:hover .cat-play {
