  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --bg2: #111114;
      --bg3: #1a1a1e;
      --card: #161618;
      --border: #3a1a1a;
      --accent: #f03e3e;
      --accent2: #ff6b6b;
      --gold: #f5c518;
      --text: #fff0f0;
      --text2: #c8a8a8;
      --text3: #7a5050;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }

    /* ── 导航 ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(12,12,14,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; gap: 32px;
    }

    .logo {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; white-space: nowrap; margin-right: 8px;
    }

    nav { display: flex; gap: 4px; flex: 1; }

    nav a {
      color: var(--text2); text-decoration: none;
      font-size: 14px; font-weight: 500;
      padding: 6px 14px; border-radius: 6px;
      transition: color .2s, background .2s; white-space: nowrap;
    }

    nav a:hover { color: var(--text); background: var(--bg3); }
    nav a.active { color: var(--accent); background: rgba(240,62,62,.12); }

    .nav-item { position: relative; }
    .nav-item > a .arrow { font-size: 10px; margin-left: 3px; display: inline-block; transition: transform .2s; }
    .nav-item:hover > a .arrow { transform: rotate(180deg); }

    .dropdown-list {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #141416;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 16px 48px rgba(0,0,0,.7);
      z-index: 200;
      min-width: 120px;
      padding: 8px 0;
      animation: dropIn .18s ease;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .nav-item:hover .dropdown-list { display: block; }

    .dropdown-list a {
      display: block;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      text-decoration: none;
      text-align: center;
      background: none;
      transition: color .15s, background .15s;
    }

    .dropdown-list a:hover { color: var(--accent); background: rgba(240,62,62,.08); }

    .nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }

    .search-box {
      display: flex; align-items: center;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 0 14px; gap: 8px; height: 36px;
    }

    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 13px; width: 160px;
    }

    .search-box input::placeholder { color: var(--text3); }

    .btn-login {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 20px;
      padding: 7px 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }

    .btn-login:hover { opacity: .85; }

    /* ── 顶部标签滚动条 ── */
    .tag-scroll-wrap {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .tag-scroll {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      display: flex; gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tag-scroll::-webkit-scrollbar { display: none; }

    .scroll-tag {
      flex-shrink: 0;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }

    .scroll-tag:hover { color: var(--text); }
    .scroll-tag.on { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── 主内容 ── */
    .page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── 页面标题 ── */
    .page-title-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .page-title-bar h1 {
      font-size: 22px;
      font-weight: 800;
    }

    .total-badge {
      background: var(--gold);
      color: #111;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── 三栏 Tab ── */
    .tab-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .tab-item {
      padding: 13px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      position: relative;
      transition: color .2s, background .2s;
    }

    .tab-item:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .tab-item.on { color: var(--accent); background: rgba(240,62,62,.08); }

    .tab-item.on::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    .tab-item:hover:not(.on) { color: var(--text); background: rgba(255,255,255,.04); }

    /* ── 卡片网格 4列 ── */
    .col-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    /* 合集卡片 */
    .col-card {
      cursor: pointer;
      transition: transform .2s;
    }

    .col-card:hover { transform: translateY(-3px); }

    /* 封面区域 */
    .col-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
      margin-bottom: 10px;
    }

    /* 斜纹占位背景（模拟截图里的碳纤维纹理） */
    .col-thumb-bg {
      width: 100%; height: 100%;
      background-color: #1a1a1a;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,.03) 6px,
        rgba(255,255,255,.03) 12px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,.2);
      letter-spacing: 2px;
      transition: transform .3s;
    }

    .col-card:hover .col-thumb-bg { transform: scale(1.04); }

    /* 真实图片样式 */
    .col-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }

    .col-card:hover .col-thumb img { transform: scale(1.04); }

    /* 右下角集数角标 */
    .col-count {
      position: absolute;
      bottom: 8px; right: 10px;
      color: rgba(255,255,255,.85);
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,.9);
    }

    /* 悬停遮罩 */
    .col-hover-mask {
      position: absolute;
      inset: 0;
      background: rgba(240,62,62,.15);
      opacity: 0;
      transition: opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .col-hover-mask .play-btn {
      width: 48px; height: 48px;
      background: rgba(240,62,62,.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff;
      transform: scale(.8);
      transition: transform .2s;
    }

    .col-card:hover .col-hover-mask { opacity: 1; }
    .col-card:hover .play-btn { transform: scale(1); }

    /* 卡片信息 */
    .col-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }

    .col-card:hover .col-title { color: var(--accent2); }
    .col-title.hot { color: var(--accent); }

    .col-meta {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .col-meta .dot { width: 3px; height: 3px; background: var(--text3); border-radius: 50%; }

    /* ── 分页 ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 48px;
    }

    .pg-btn {
      min-width: 36px; height: 36px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }

    .pg-btn:hover, .pg-btn.on {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    .pg-btn.dots { background: none; border-color: transparent; color: var(--text3); cursor: default; }

    /* ── 底部 ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--bg2);
      padding: 28px 24px;
      text-align: center;
    }

    .footer-links {
      display: flex; justify-content: center;
      gap: 24px; flex-wrap: wrap; margin-bottom: 12px;
    }

    .footer-links a { font-size: 13px; color: var(--text3); text-decoration: none; transition: color .2s; }
    .footer-links a:hover { color: var(--text2); }
    .footer-copy { font-size: 12px; color: var(--text3); }

    /* ── 响应式 ── */
    @media (max-width: 1100px) { .col-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 760px)  { .col-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 480px)  { .search-box { display: none; } }
  </style>
</head>

<script>
  // ── 合集数据 ──
  const collections = [
    { title: '年度精选合集 全系列整理',   count: 54, views: '128万', update: '2天前更新', hot: false },
    { title: '热门系列 大尺度私拍合集',   count: 52, views: '128万', update: '3天前更新', hot: false },
    { title: '精品高清合集 全集收录',     count: 48, views: '92万',  update: '5天前更新', hot: true  },
    { title: '约会实录系列 完整版',       count: 38, views: '76万',  update: '1周前更新', hot: false },
    { title: '精品合集 全集整理',         count: 45, views: '110万', update: '4天前更新', hot: false },
    { title: '全系列整理 高清合集',       count: 67, views: '235万', update: '1天前更新', hot: true  },
    { title: '精选无码合集 高清版',       count: 56, views: '168万', update: '3天前更新', hot: false },
    { title: '约会实拍合集 系列完整版',   count: 41, views: '98万',  update: '6天前更新', hot: false },
    { title: '国产精品 年度合集',         count: 33, views: '85万',  update: '2天前更新', hot: false },
    { title: '经典系列 高清重制版',       count: 29, views: '63万',  update: '1周前更新', hot: false },
    { title: '热门UP主 全套合集',         count: 71, views: '312万', update: '1天前更新', hot: true  },
    { title: '年度合集 精华版整理',       count: 44, views: '77万',  update: '5天前更新', hot: false },
    { title: '高清无水印 全集合集',       count: 58, views: '144万', update: '2天前更新', hot: false },
    { title: '系列合集 完结整理',         count: 36, views: '55万',  update: '2周前更新', hot: false },
    { title: '精选合集 画质升级版',       count: 49, views: '89万',  update: '4天前更新', hot: true  },
    { title: '独家系列 全程记录合集',     count: 62, views: '201万', update: '1天前更新', hot: false },
  ];

  const PAGE_SIZE = 8;
  let currentPage = 1;
  const totalPages = Math.ceil(collections.length / PAGE_SIZE);

  // 更新总数
  document.getElementById('totalBadge').textContent = '共收录 ' + collections.length + ' 套';

  function renderCards(page) {
    const grid = document.getElementById('colGrid');
    grid.innerHTML = '';
    const start = (page - 1) * PAGE_SIZE;
    const slice = collections.slice(start, start + PAGE_SIZE);

    slice.forEach(function(c) {
      const card = document.createElement('div');
      card.className = 'col-card';
      card.innerHTML =
        '<div class="col-thumb">' +
          '<div class="col-thumb-bg">合集封面</div>' +
          '<div class="col-hover-mask"><div class="play-btn">▶</div></div>' +
          '<span class="col-count">' + c.count + '部</span>' +
        '</div>' +
        '<div class="col-title' + (c.hot ? ' hot' : '') + '">' + c.title + '</div>' +
        '<div class="col-meta">' +
          '<span>👁 ' + c.views + '</span>' +
          '<span class="dot"></span>' +
          '<span>' + c.update + '</span>' +
        '</div>';
      grid.appendChild(card);
    });
  }

  function renderPagination(page) {
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';

    function btn(label, pageNum, isOn, isDots) {
      var b = document.createElement('button');
      b.className = 'pg-btn' + (isOn ? ' on' : '') + (isDots ? ' dots' : '');
      b.textContent = label;
      if (!isDots) {
        b.addEventListener('click', function() {
          currentPage = pageNum;
          renderCards(currentPage);
          renderPagination(currentPage);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
      pg.appendChild(b);
    }

    btn('‹ 上一页', page - 1, false, page === 1);
    for (var i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - page) <= 1) {
        btn(i, i, i === page, false);
      } else if (Math.abs(i - page) === 2) {
        btn('···', i, false, true);
      }
    }
    btn('下一页 ›', page + 1, false, page === totalPages);
  }

  // 初始渲染
  renderCards(1);
  renderPagination(1);

  // Tab 切换
  document.querySelectorAll('.tab-item').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('on'); });
      tab.classList.add('on');
      currentPage = 1;
      renderCards(1);
      renderPagination(1);
    });
  });

  // 标签滚动条
  document.querySelectorAll('.scroll-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('.scroll-tag').forEach(function(t) { t.classList.remove('on'); });
      tag.classList.add('on');
    });
  });
</script>
