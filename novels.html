    /* 加精角标 */

    }

      .search-box { display: none; }

<script>
  const novels = [
    { title: '天道图书馆：主角靠读书系统无敌称霸',    author: '书虫大人',  date: '2026-05-04', views: 12800, hot: true  },

    { title: '武道巅峰：一剑破万法踏天而行',          author: '剑客无名',  date: '2026-05-04', views: 8700,  hot: true  },
    { title: '修真界最强废材觉醒后我无敌了',          author: '逍遥散人',  date: '2026-05-04', views: 7200,  hot: false },
    { title: '星际征途：人类最后的文明守护者',         author: '星辰大海',  date: '2026-05-03', views: 6500,  hot: true  },
    { title: '大唐第一纨绔：开局迎娶公主殿下',        author: '长安客',    date: '2026-05-03', views: 5400,  hot: false },
    { title: '全球末日：我在废土建立帝国',            author: '荒野求生',  date: '2026-05-03', views: 4900,  hot: false },
    { title: '神级奶爸：带娃升级无敌系统',            author: '奶爸无敌',  date: '2026-05-03', views: 4300,  hot: true  },
    { title: '深海龙宫：我成了龙王的上门女婿',        author: '深渊漫步',  date: '2026-05-02', views: 3800,  hot: false },
    { title: '玄幻：我能看见气运面板所有人的命运',     author: '命运掌控',  date: '2026-05-02', views: 3500,  hot: false },
    { title: '重回1990：从下岗工人到首富传奇之路',    author: '时光倒流',  date: '2026-05-02', views: 3200,  hot: true  },
    { title: '斗罗续传：唐三后人踏上封神之路',        author: '魂师传承',  date: '2026-05-02', views: 2900,  hot: false },
    { title: '异界召唤：我成了BOSS们的头目',         author: '召唤师',    date: '2026-05-01', views: 2700,  hot: false },
    { title: '京都风云：权谋世界里的逆袭棋局',        author: '棋局先生',  date: '2026-05-01', views: 2500,  hot: true  },
    { title: '神医下山：都市里的悬壶济世传说',        author: '白衣神医',  date: '2026-05-01', views: 2300,  hot: false },
    { title: '无限流：每次通关都能带走一件神器',       author: '无限旅者',  date: '2026-05-01', views: 2100,  hot: false },
    { title: '赘婿逆袭：被嘲笑的废物竟是隐藏王者',   author: '卧龙先生',  date: '2026-04-30', views: 1900,  hot: true  },
    { title: '末世之王：用系统改变整个文明进程',      author: '末日幸存',  date: '2026-04-30', views: 1700,  hot: false },
    { title: '原来我是传说中的天选之人',              author: '天命之子',  date: '2026-04-30', views: 1500,  hot: false },
    { title: '灵气复苏：普通人觉醒后的修行日记',      author: '修行者',    date: '2026-04-30', views: 1300,  hot: false },
  ];

  const PAGE_SIZE = 10;
  let currentPage = 1;
  const totalPages = Math.ceil(novels.length / PAGE_SIZE);

  function fmtViews(n) {
    return n >= 10000 ? (n / 10000).toFixed(1) + '万' : n.toString();
  }

  function renderNovels(page) {
    const grid = document.getElementById('novelGrid');
    grid.innerHTML = '';
    const slice = novels.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
    slice.forEach(function(n) {
      var card = document.createElement('div');
      card.className = 'novel-card';
      card.innerHTML =
        (n.hot ? '<span class="badge-hot">加精</span>' : '') +
        '<div class="novel-title">' + n.title + '</div>' +
        '<div class="novel-meta">' +
          '<span><span class="icon">👤</span>' + n.author + '</span>' +
          '<span><span class="icon">🕐</span>' + n.date + '</span>' +
          '<span><span class="icon">👁</span>' + fmtViews(n.views) + '</span>' +
        '</div>';
      grid.appendChild(card);
    });
  }

  function renderPagination(page) {
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';

    function mkBtn(label, pageNum, isOn, isDots) {
      var b = document.createElement('button');
      b.className = 'pg-btn' + (isOn ? ' on' : '') + (isDots ? ' dots' : '');
      b.textContent = label;
      if (!isDots) {
        b.addEventListener('click', function() {
          currentPage = pageNum;
          renderNovels(currentPage);
          renderPagination(currentPage);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
      pg.appendChild(b);
    }

    if (page > 1) mkBtn('‹ 上一页', page - 1, false, false);
    for (var i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - page) <= 1) {
        mkBtn(i, i, i === page, false);
      } else if (Math.abs(i - page) === 2) {
        mkBtn('···', i, false, true);
      }
    }
    if (page < totalPages) mkBtn('下一页 ›', page + 1, false, false);
  }

  renderNovels(1);
  renderPagination(1);

  // Tab 切换
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      currentPage = 1;
      renderNovels(1);
      renderPagination(1);
    });
  });

  // 侧边分类切换
  document.querySelectorAll('.sidebar-cat').forEach(function(cat) {
    cat.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelectorAll('.sidebar-cat').forEach(function(c) { c.classList.remove('on'); });
      cat.classList.add('on');
      document.querySelector('.sidebar-top span:nth-child(2)').textContent = cat.textContent;
    });
  });
</script>
